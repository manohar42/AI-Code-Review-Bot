<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Code Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#3b82f6',
                            600: '#2563eb'
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col">

    <nav class="p-6">
        <a href="index.html" class="flex items-center gap-2">
            <i data-lucide="bot" class="text-brand-500 w-8 h-8"></i>
            <span class="font-bold text-xl">CodeReview.ai</span>
        </a>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white dark:bg-gray-900 rounded-2xl shadow-xl border border-gray-100 dark:border-gray-800 p-8">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold">Create an account</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Start reviewing your code with AI.</p>
            </div>

            <form id="registerForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1" for="firstName">First Name</label>
                    <input
                        id="firstName"
                        type="text"
                        placeholder="Jane"
                        class="w-full bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500"
                        required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1" for="lastName">Last Name</label>
                    <input
                        id="lastName"
                        type="text"
                        placeholder="Doe"
                        class="w-full bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500"
                        required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1" for="email">Email</label>
                    <input
                        id="email"
                        type="email"
                        placeholder="jane@example.com"
                        class="w-full bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500"
                        required>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1" for="password">Password</label>
                    <input
                        id="password"
                        type="password"
                        placeholder="••••••••"
                        class="w-full bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-brand-500"
                        required>
                </div>

                <button
                    type="submit"
                    class="w-full bg-brand-600 hover:bg-brand-500 text-white font-semibold py-2.5 rounded-lg mt-2">
                    Create Account
                </button>
            </form>

            <p id="message" class="text-sm mt-4 text-center"></p>

            <p class="text-center text-sm text-gray-500 dark:text-gray-400 mt-6">
                Already have an account?
                <a href="login.html" class="text-brand-600 dark:text-brand-400 font-medium hover:underline">Sign in</a>
            </p>
        </div>
    </main>

    <script>lucide.createIcons();</script>
    <script src="js/register.js"></script>
</body>
</html>
