<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Review Bot - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 500: '#3b82f6', 600: '#2563eb' } } } } }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { transition: background-color 0.2s, color 0.2s; }</style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 flex flex-col min-h-screen">

    <!-- Navigation (Logged Out) -->
    <nav class="h-16 flex items-center justify-between px-6 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shadow-sm">
        <a href="index.html" class="flex items-center gap-2">
            <i data-lucide="bot" class="text-brand-500 w-8 h-8"></i>
            <span class="font-bold text-xl">Code<span class="text-brand-500">Review</span>.ai</span>
        </a>
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400">
                <i data-lucide="sun" id="theme-icon"></i>
            </button>
            <a href="login.html" class="text-sm font-medium hover:text-brand-500">Sign in</a>
            <a href="register.html" class="text-sm font-medium bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 rounded-lg transition">Get Started</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col items-center justify-center px-6 py-20 text-center max-w-4xl mx-auto">
        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-brand-100 dark:bg-brand-900/30 text-brand-700 dark:text-brand-300 text-sm font-medium mb-8">
            <span class="relative flex h-2 w-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-brand-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-brand-500"></span></span>
            Powered by Claude 3.5 Sonnet
        </div>
        <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight mb-6 bg-clip-text text-transparent bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400">
            Ship Better Code, <br/>Faster.
        </h1>
        <p class="text-lg md:text-xl text-gray-600 dark:text-gray-400 mb-10 max-w-2xl leading-relaxed">
            AI-powered code reviews that catch bugs, security flaws, and code smells before they reach production. Get instant, actionable feedback directly in your browser.
        </p>
        <div class="flex flex-col sm:flex-row gap-4">
            <a href="register.html" class="bg-brand-600 hover:bg-brand-500 text-white px-8 py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2">
                Start Reviewing for Free <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </a>
            <a href="dashboard.html" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-8 py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2">
                <i data-lucide="play" class="w-5 h-5 text-gray-500"></i> Live Demo
            </a>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const html = document.documentElement;
        let isDark = true;
        document.getElementById('theme-toggle').addEventListener('click', () => {
            isDark = !isDark;
            html.classList.toggle('dark', isDark);
            document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>
