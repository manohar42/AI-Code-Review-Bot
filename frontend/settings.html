<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - AI Code Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 500: '#3b82f6', 600: '#2563eb' } } } } }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col">

    <nav class="h-16 flex-shrink-0 flex items-center justify-between px-6 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 z-50">
        <div class="flex items-center gap-6">
            <a href="index.html" class="flex items-center gap-2">
                <i data-lucide="bot" class="text-brand-500 w-8 h-8"></i>
                <span class="font-bold text-xl">CodeReview</span>
            </a>
            <div class="flex items-center gap-4 text-sm font-medium">
                <a href="dashboard.html" class="text-gray-500 hover:text-white">Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 max-w-3xl mx-auto w-full">
        <h1 class="text-3xl font-bold mb-8">Account Settings</h1>
        
        <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4 border-b border-gray-100 dark:border-gray-800 pb-2">Profile Information</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Name</label>
                    <input type="text" value="Jane Doe" class="w-full bg-gray-50 dark:bg-gray-950 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" value="jane@example.com" disabled class="w-full bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-2 cursor-not-allowed">
                </div>
                <button class="bg-brand-600 hover:bg-brand-500 text-white px-4 py-2 rounded-lg text-sm font-medium">Save Changes</button>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
    <script src="js/app.js"></script>
</body>
</html>
