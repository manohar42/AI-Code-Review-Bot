<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - AI Code Review</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { colors: { brand: { 500: '#3b82f6', 600: '#2563eb' } } } } }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen flex flex-col">

    <!-- Authenticated Navigation -->
    <nav class="h-16 flex-shrink-0 flex items-center justify-between px-6 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 z-50">
        <div class="flex items-center gap-6">
            <a href="index.html" class="flex items-center gap-2">
                <i data-lucide="bot" class="text-brand-500 w-8 h-8"></i>
                <span class="font-bold text-xl hidden sm:block">CodeReview</span>
            </a>
            <div class="flex items-center gap-4 text-sm font-medium">
                <a href="dashboard.html" class="text-gray-500 hover:text-gray-900 dark:hover:text-white">Dashboard</a>
                <a href="history.html" class="text-brand-600 dark:text-brand-400">History</a>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800">
                <i data-lucide="sun" id="theme-icon"></i>
            </button>
            <div class="relative group">
                <div class="w-8 h-8 rounded-full bg-brand-500 flex items-center justify-center text-white text-sm font-bold cursor-pointer">JD</div>
            </div>
        </div>
    </nav>

    <main class="flex-1 p-6 md:p-10 max-w-5xl mx-auto w-full">
        <div class="flex items-end justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold mb-2">Review History</h1>
                <p class="text-gray-500 dark:text-gray-400">View and analyze your past code submissions.</p>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 dark:bg-gray-950/50 border-b border-gray-200 dark:border-gray-800 text-xs uppercase tracking-wider text-gray-500">
                        <th class="p-4 font-semibold">Snippet / Date</th>
                        <th class="p-4 font-semibold">Language</th>
                        <th class="p-4 font-semibold">Score</th>
                        <th class="p-4 font-semibold text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-gray-100 dark:border-gray-800/50 hover:bg-gray-50 dark:hover:bg-gray-800/50">
                        <td class="p-4"><div class="font-medium">auth_controller.js</div><div class="text-xs text-gray-500">Today, 2:30 PM</div></td>
                        <td class="p-4"><span class="px-2 py-1 rounded bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700">JavaScript</span></td>
                        <td class="p-4 font-bold text-yellow-500">65/100</td>
                        <td class="p-4 text-right"><a href="detail.html" class="text-brand-600 hover:underline">View Report</a></td>
                    </tr>
                    <tr class="border-b border-gray-100 dark:border-gray-800/50 hover:bg-gray-50 dark:hover:bg-gray-800/50">
                        <td class="p-4"><div class="font-medium">database_setup.py</div><div class="text-xs text-gray-500">Yesterday</div></td>
                        <td class="p-4"><span class="px-2 py-1 rounded bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700">Python</span></td>
                        <td class="p-4 font-bold text-green-500">100/100</td>
                        <td class="p-4 text-right"><a href="detail.html" class="text-brand-600 hover:underline">View Report</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        lucide.createIcons();
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            document.getElementById('theme-icon').setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>
